<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Parking - Live Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 42px;
            margin-bottom: 10px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        .stat-value {
            font-size: 48px;
            font-weight: bold;
            color: #1e3c72;
            margin-bottom: 10px;
        }
        
        .stat-label {
            font-size: 14px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .parking-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .parking-spot {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 3px solid transparent;
        }
        
        .parking-spot:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .parking-spot.available {
            border-color: #4caf50;
            background: #e8f5e9;
        }
        
        .parking-spot.occupied {
            border-color: #f44336;
            background: #ffebee;
        }
        
        .spot-icon {
            font-size: 36px;
            margin-bottom: 10px;
        }
        
        .spot-id {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        
        .spot-status {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
        }
        
        .controls {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }
        
        .control-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        select, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        
        button {
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-entry {
            background: #4caf50;
            color: white;
        }
        
        .btn-entry:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        
        .btn-exit {
            background: #f44336;
            color: white;
        }
        
        .btn-exit:hover {
            background: #da190b;
            transform: translateY(-2px);
        }
        
        .log {
            background: white;
            padding: 20px;
            border-radius: 15px;
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 13px;
        }
        
        .log-entry {
            padding: 8px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
        }
        
        .log-entry:last-child {
            border-bottom: none;
        }
        
        .log-time {
            color: #999;
            font-size: 11px;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .status-entry {
            background: #4caf50;
            color: white;
        }
        
        .status-exit {
            background: #f44336;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🅿️ Smart Parking System</h1>
            <p>Real-Time IoT-Powered Parking Management</p>
        </header>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalSpots">20</div>
                <div class="stat-label">Total Spots</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="available">20</div>
                <div class="stat-label">Available</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="occupied">0</div>
                <div class="stat-label">Occupied</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="revenue">$0</div>
                <div class="stat-label">Revenue Today</div>
            </div>
        </div>
        
        <div class="controls">
            <h2 style="margin-bottom: 20px;">🎮 Simulate Parking Event</h2>
            
            <div class="control-group">
                <label>Select Parking Spot:</label>
                <select id="spotSelect">
                    <!-- Populated by JS -->
                </select>
            </div>
            
            <div class="control-group">
                <label>Phone Number (for SMS):</label>
                <input type="tel" id="phoneInput" value="+1234567890" placeholder="+1234567890">
            </div>
            
            <div class="button-group">
                <button class="btn-entry" onclick="simulateEntry()">
                    🚗 Car Entry
                </button>
                <button class="btn-exit" onclick="simulateExit()">
                    🚙 Car Exit
                </button>
            </div>
        </div>
        
        <div class="parking-grid" id="parkingGrid">
            <!-- Populated by JS -->
        </div>
        
        <div class="log" id="activityLog">
            <strong>📋 Activity Log</strong>
        </div>
    </div>

    <script>
        // ⚠️ REPLACE WITH YOUR API URL
        const API_URL = 'https://YOUR_API_ID.execute-api.us-east-1.amazonaws.com';
        
        let spots = [];
        let totalRevenue = 0;
        
        // Initialize
        async function init() {
            await loadSpots();
            renderParkingGrid();
            populateSpotSelect();
            addLog('System initialized ✓');
        }
        
        async function loadSpots() {
            // In production, this would fetch from API
            // For demo, we'll initialize locally
            spots = [];
            for (let i = 1; i <= 20; i++) {
                spots.push({
                    spot_id: `SPOT-${String(i).padStart(3, '0')}`,
                    status: 'available',
                    floor: Math.floor((i-1)/10) + 1
                });
            }
            updateStats();
        }
        
        function renderParkingGrid() {
            const grid = document.getElementById('parkingGrid');
            grid.innerHTML = '';
            
            spots.forEach(spot => {
                const div = document.createElement('div');
                div.className = `parking-spot ${spot.status}`;
                div.onclick = () => selectSpot(spot.spot_id);
                
                div.innerHTML = `
                    <div class="spot-icon">${spot.status === 'available' ? '🟢' : '🔴'}</div>
                    <div class="spot-id">${spot.spot_id}</div>
                    <div class="spot-status">${spot.status}</div>
                `;
                
                grid.appendChild(div);
            });
        }
        
        function populateSpotSelect() {
            const select = document.getElementById('spotSelect');
            select.innerHTML = '<option value="">-- Select Spot --</option>';
            
            spots.forEach(spot => {
                const option = document.createElement('option');
                option.value = spot.spot_id;
                option.textContent = `${spot.spot_id} (${spot.status})`;
                select.appendChild(option);
            });
        }
        
        function selectSpot(spotId) {
            document.getElementById('spotSelect').value = spotId;
        }
        
        async function simulateEntry() {
            const spotId = document.getElementById('spotSelect').value;
            const phone = document.getElementById('phoneInput').value;
            
            if (!spotId) {
                alert('Please select a parking spot');
                return;
            }
            
            const spot = spots.find(s => s.spot_id === spotId);
            if (spot.status === 'occupied') {
                alert('This spot is already occupied!');
                return;
            }
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        event_type: 'ENTRY',
                        spot_id: spotId,
                        user_phone: phone
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Update local state
                    spot.status = 'occupied';
                    spot.session_id = data.session_id;
                    spot.entry_time = new Date();
                    
                    renderParkingGrid();
                    updateStats();
                    addLog(`🚗 ${spotId} - Car entered`, 'entry');
                    
                    alert(`✅ Entry recorded!\nSession: ${data.session_id}`);
                } else {
                    alert(`❌ Error: ${data.error}`);
                }
            } catch (error) {
                console.error(error);
                alert('Network error. Using local simulation.');
                
                // Fallback to local simulation
                spot.status = 'occupied';
                spot.entry_time = new Date();
                renderParkingGrid();
                updateStats();
                addLog(`🚗 ${spotId} - Car entered (local)`, 'entry');
            }
        }
        
        async function simulateExit() {
            const spotId = document.getElementById('spotSelect').value;
            const phone = document.getElementById('phoneInput').value;
            
            if (!spotId) {
                alert('Please select a parking spot');
                return;
            }
            
            const spot = spots.find(s => s.spot_id === spotId);
            if (spot.status === 'available') {
                alert('This spot is already empty!');
                return;
            }
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        event_type: 'EXIT',
                        spot_id: spotId,
                        user_phone: phone
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Update local state
                    spot.status = 'available';
                    totalRevenue += data.fee;
                    
                    renderParkingGrid();
                    updateStats();
                    addLog(`🚙 ${spotId} - Car exited - $${data.fee} (${data.duration_hours}h)`, 'exit');
                    
                    alert(`✅ Exit recorded!\nDuration: ${data.duration_hours}h\nFee: $${data.fee}`);
                } else {
                    alert(`❌ Error: ${data.error}`);
                }
            } catch (error) {
                console.error(error);
                alert('Network error. Using local simulation.');
                
                // Fallback to local simulation
                const duration = (new Date() - spot.entry_time) / 1000 / 3600;
                const fee = Math.max(2, Math.round(duration * 5 * 100) / 100);
                
                spot.status = 'available';
                totalRevenue += fee;
                
                renderParkingGrid();
                updateStats();
                addLog(`🚙 ${spotId} - Car exited - $${fee} (${duration.toFixed(2)}h) (local)`, 'exit');
            }
        }
        
        function updateStats() {
            const available = spots.filter(s => s.status === 'available').length;
            const occupied = spots.filter(s => s.status === 'occupied').length;
            
            document.getElementById('totalSpots').textContent = spots.length;
            document.getElementById('available').textContent = available;
            document.getElementById('occupied').textContent = occupied;
            document.getElementById('revenue').textContent = `$${totalRevenue.toFixed(2)}`;
        }
        
        function addLog(message, type = '') {
            const log = document.getElementById('activityLog');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            
            const badge = type ? `<span class="status-badge status-${type}">${type}</span>` : '';
            
            entry.innerHTML = `
                <div>
                    <span class="log-time">${new Date().toLocaleTimeString()}</span>
                    ${badge}
                    ${message}
                </div>
            `;
            
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }
        
        // Auto-refresh every 10 seconds (optional)
        // setInterval(loadSpots, 10000);
        
        init();
    </script>
</body>
</html>
